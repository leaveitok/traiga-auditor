# cloudbuild.yaml — CI/CD pipeline for AI Transparency Auditor v2
#
# Triggered automatically on every push to the main branch via
# Cloud Build GitHub App connection.
#
# Stages:
#   1. Build Docker image from backend/ and push to Artifact Registry
#   2. Deploy new image to Cloud Run (backend API)
#
# Frontend (Firebase Hosting) is static and only needs redeployment
# when frontend/ source files change — handled separately or manually.

substitutions:
  _REGION: us-central1
  _SERVICE: ai-transparency-auditor-api
  _REPO: ai-transparency-auditor
  _IMAGE: api
  _PROJECT: traiga-auditor

steps:
  # ── Step 1: Build and push Docker image ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-image
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_IMAGE}:latest'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_IMAGE}:$COMMIT_SHA'
      - 'backend'
    dir: '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-image
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_IMAGE}'
    waitFor: ['build-image']

  # ── Step 2: Deploy to Cloud Run ───────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-cloud-run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_IMAGE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--env-vars-file=deploy/env.yaml'
      - '--set-secrets=/secrets/service_account.json=traiga-service-account:latest'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=300'
      - '--concurrency=80'
      - '--project=${_PROJECT}'
      - '--quiet'
    waitFor: ['push-image']

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_IMAGE}:latest'
  - '${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/${_IMAGE}:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: 1200s
