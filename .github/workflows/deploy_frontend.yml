name: Deploy Frontend

# Builds the Vue/Vite frontend from COMMITTED source and publishes it to Firebase
# Hosting on every push to main. This replaces the manual deploy_frontend.bat:
#   * kills git/prod drift — only what's committed can ship (no working-tree deploys)
#   * gates broken builds — a failing `vite build` fails the job BEFORE deploy
#   * removes the laptop dependency — ships from CI, not one machine
on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: traiga-auditor

jobs:
  frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        # Self-heal the cross-platform lockfile / rollup optional-dep bug (npm #4828):
        # a package-lock generated on Windows can omit the Linux rollup binary.
        run: npm ci || { echo "npm ci failed - clean reinstall"; rm -rf node_modules package-lock.json; npm install; }

      # Read the human-facing release number from the repo-root VERSION file. It has to
      # be a separate step because an `env:` block cannot run shell substitution.
      - name: Read release number
        id: rel
        run: echo "release=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build (Vite)
        working-directory: frontend
        # This IS the gate: a broken UI fails here and the deploy step never runs.
        # Stamp the build with the deploy commit -> import.meta.env.VITE_BUILD_SHA,
        # and with the release number -> import.meta.env.VITE_RELEASE.
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_RELEASE: ${{ steps.rel.outputs.release }}
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project ${{ env.PROJECT_ID }} --non-interactive
